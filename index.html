<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CricHeroes Stats</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 2rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; color: #E8373E; }
    .header p { color: #94a3b8; margin-top: 0.3rem; }
    .tabs { display: flex; max-width: 700px; margin: 0 auto 1.5rem; gap: 0.5rem; }
    .tab { flex: 1; padding: 0.7rem; border-radius: 10px; text-align: center; cursor: pointer; background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 0.95rem; transition: all 0.15s; }
    .tab.active { background: #E8373E; color: white; border-color: #E8373E; }
    .search-box { max-width: 700px; margin: 0 auto 1.5rem; background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 1.5rem; }
    .search-row { display: flex; gap: 0.8rem; }
    .search-row input { flex: 1; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; padding: 0.7rem 1rem; border-radius: 8px; font-size: 1rem; }
    .search-row input::placeholder { color: #475569; }
    .search-row input:focus { outline: none; border-color: #E8373E; }
    .search-btn { background: #E8373E; color: white; border: none; padding: 0.7rem 1.8rem; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .player-list { max-width: 700px; margin: 0 auto 1.5rem; }
    .player-list h3 { color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    .player-item { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 0.9rem 1.2rem; margin-bottom: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 1rem; transition: border-color 0.15s; }
    .player-item:hover { border-color: #E8373E; background: #263042; }
    .player-avatar { width: 48px; height: 48px; border-radius: 50%; background: #E8373E; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; flex-shrink: 0; overflow: hidden; }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .load-more-btn { width: 100%; padding: 0.7rem; background: #1e293b; border: 1px dashed #334155; color: #64748b; border-radius: 10px; cursor: pointer; font-size: 0.9rem; margin-top: 0.5rem; }
    .load-more-btn:hover { border-color: #E8373E; color: #E8373E; }
    .profile-card { background: #1e293b; border-radius: 16px; padding: 1.5rem 2rem; max-width: 700px; margin: 0 auto 2rem; display: flex; align-items: center; gap: 1.5rem; border: 1px solid #334155; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: #E8373E; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: white; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info h2 { font-size: 1.4rem; }
    .profile-info p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.2rem; }
    .badge { background: #E8373E22; color: #E8373E; border: 1px solid #E8373E55; padding: 0.2rem 0.7rem; border-radius: 999px; font-size: 0.75rem; display: inline-block; margin-top: 0.4rem; }
    .section-title { max-width: 700px; margin: 0 auto 0.8rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; max-width: 700px; margin: 0 auto 2rem; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1rem; text-align: center; transition: transform 0.15s; }
    .stat-card:hover { transform: translateY(-3px); }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #E8373E; }
    .stat-card .label { font-size: 0.75rem; color: #64748b; margin-top: 0.3rem; text-transform: uppercase; }
    .live-section { max-width: 700px; margin: 0 auto; }
    .live-match { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; cursor: pointer; transition: border-color 0.15s; }
    .live-match:hover { border-color: #E8373E; }
    .live-match a { text-decoration: none; color: inherit; }
    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .match-type { color: #64748b; font-size: 0.78rem; }
    .status-badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 999px; font-weight: 600; }
    .status-live { background: #E8373E; color: white; animation: pulse 1.5s infinite; }
    .status-past { background: #334155; color: #94a3b8; }
    .status-upcoming { background: #1d4ed8; color: white; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
    .team-a { text-align: left; }
    .team-b { text-align: right; }
    .team-name { font-weight: 600; font-size: 0.95rem; }
    .team-score { font-size: 1.2rem; font-weight: 700; color: #E8373E; margin-top: 0.2rem; }
    .vs { color: #475569; font-size: 0.85rem; text-align: center; }
    .match-footer { color: #64748b; font-size: 0.78rem; margin-top: 0.8rem; border-top: 1px solid #1e293b; padding-top: 0.6rem; }
    .match-summary { color: #94a3b8; font-size: 0.82rem; margin-top: 0.4rem; font-style: italic; }
    .load-more-live { display: block; width: 100%; padding: 0.8rem; background: #1e293b; border: 1px dashed #334155; color: #64748b; border-radius: 10px; cursor: pointer; font-size: 0.9rem; margin-top: 0.5rem; text-align: center; }
    .load-more-live:hover { border-color: #E8373E; color: #E8373E; }
    .hidden { display: none; }
    .status { text-align: center; color: #94a3b8; margin: 1rem 0; font-size: 0.9rem; }
    .error { color: #f87171; text-align: center; margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="header">
  <h1>🏏 CricHeroes Dashboard</h1>
  <p>Search players & watch live matches</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">🔍 Player Search</div>
  <div class="tab" onclick="switchTab('live')">🔴 Live Matches</div>
</div>

<!-- SEARCH TAB -->
<div id="tab-search">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="input-name" placeholder="Enter player name (e.g. Faizan Joo)" />
      <button class="search-btn" id="search-btn" onclick="search()">Search</button>
    </div>
  </div>
  <div class="player-list hidden" id="player-list">
    <h3>🔽 Multiple players found — select one</h3>
    <div id="player-items"></div>
    <button class="load-more-btn hidden" id="load-more-btn" onclick="loadMore()">Load more players...</button>
  </div>
  <p class="status hidden" id="status"></p>
  <p class="error" id="error"></p>
  <div id="results" class="hidden">
    <div class="profile-card">
      <div class="avatar" id="avatar-wrap"></div>
      <div class="profile-info">
        <h2 id="pname">—</h2>
        <p id="pcity"></p>
        <span class="badge" id="prole"></span>
      </div>
    </div>
    <div class="section-title">⚔️ Batting</div>
    <div class="grid" id="batting-grid"></div>
    <div class="section-title">🎯 Bowling</div>
    <div class="grid" id="bowling-grid"></div>
  </div>
</div>

<!-- LIVE TAB -->
<div id="tab-live" class="hidden">
  <p class="status hidden" id="live-status"></p>
  <p class="error hidden" id="live-error"></p>
  <div class="live-section" id="live-matches"></div>
  <button class="load-more-live hidden" id="load-more-live" onclick="loadMoreLive()">Load more matches...</button>
</div>

<script>
  let currentSearch = '';
  let currentPage = 1;
  let hasNextPlayers = false;
  let livePage = 1;
  let hasNextLive = false;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='search')||(i===1&&tab==='live')));
    document.getElementById('tab-search').classList.toggle('hidden', tab !== 'search');
    document.getElementById('tab-live').classList.toggle('hidden', tab !== 'live');
    if (tab === 'live' && document.getElementById('live-matches').innerHTML === '') loadLive();
  }

  function isDefaultPhoto(url) {
    return !url || url.includes("default/user_profile");
  }

  function avatarHTML(photo, name, size) {
    if (isDefaultPhoto(photo)) {
      return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${size}px;font-weight:bold">${(name||'?')[0].toUpperCase()}</div>`;
    }
    return `<img src="${photo}" alt="${name}" onerror="this.style.display='none'">`;
  }

  function card(value, label) {
    return `<div class="stat-card"><div class="value">${value ?? 'N/A'}</div><div class="label">${label}</div></div>`;
  }

  function setStatus(msg) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.classList.toggle('hidden', !msg);
  }

  function showResults(d) {
    document.getElementById('avatar-wrap').innerHTML = avatarHTML(d.profile_photo, d.name, 28);
    document.getElementById('pname').textContent = `${d.name} #${d.player_id}`;
    document.getElementById('pcity').textContent = `📍 ${d.city}`;
    document.getElementById('prole').textContent = `${d.role} · ${d.batting_hand} · ${d.bowling_style}`;
    document.getElementById('batting-grid').innerHTML =
      card(d.total_matches,'Matches') + card(d.total_runs,'Total Runs') +
      card(d.top_score,'Top Score') + card(d.batting_avg,'Average') +
      card(d.strike_rate,'Strike Rate') + card(d.sixes,'Sixes') + card(d.fours,'Fours');
    document.getElementById('bowling-grid').innerHTML =
      card(d.total_wickets,'Wickets') + card(d.overs_bowled,'Overs') + card(d.economy,'Economy');
    document.getElementById('results').classList.remove('hidden');
  }

  async function loadStats(player_id, slug) {
    setStatus('📊 Fetching stats...');
    document.getElementById('results').classList.add('hidden');
    try {
      const res = await fetch(`/fetch-stats?id=${player_id}&name=${encodeURIComponent(slug)}`);
      if (!res.ok) throw new Error(await res.text());
      showResults(await res.json());
      setStatus('');
    } catch(e) {
      document.getElementById('error').textContent = '⚠️ ' + e.message;
      setStatus('');
    }
  }

  function renderPlayers(players) {
    const items = document.getElementById('player-items');
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-item';
      div.innerHTML = `
        <div class="player-avatar">${avatarHTML(p.photo, p.name, 18)}</div>
        <div class="player-info">
          <div style="font-weight:600">${p.name}</div>
          <div style="color:#64748b;font-size:0.82rem;margin-top:0.2rem">📍 ${p.city || 'Unknown'}</div>
        </div>`;
      div.onclick = () => {
        document.getElementById('player-list').classList.add('hidden');
        loadStats(p.user_id, p.slug);
      };
      items.appendChild(div);
    });
  }

  async function search() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) return;
    currentSearch = name;
    currentPage = 1;
    document.getElementById('error').textContent = '';
    document.getElementById('results').classList.add('hidden');
    document.getElementById('player-list').classList.add('hidden');
    document.getElementById('player-items').innerHTML = '';
    document.getElementById('search-btn').disabled = true;
    setStatus('🔍 Searching...');
    try {
      const res = await fetch(`/search-player?name=${encodeURIComponent(name)}&page=1`);
      if (!res.ok) throw new Error('Player not found.');
      const data = await res.json();
      hasNextPlayers = data.has_next;
      setStatus('');
      if (data.players.length === 1) {
        await loadStats(data.players[0].user_id, data.players[0].slug);
      } else {
        renderPlayers(data.players);
        document.getElementById('player-list').classList.remove('hidden');
        document.getElementById('load-more-btn').classList.toggle('hidden', !hasNextPlayers);
      }
    } catch(e) {
      document.getElementById('error').textContent = '⚠️ ' + e.message;
      setStatus('');
    } finally {
      document.getElementById('search-btn').disabled = false;
    }
  }

  async function loadMore() {
    currentPage++;
    document.getElementById('load-more-btn').textContent = 'Loading...';
    try {
      const res = await fetch(`/search-player?name=${encodeURIComponent(currentSearch)}&page=${currentPage}`);
      const data = await res.json();
      hasNextPlayers = data.has_next;
      renderPlayers(data.players);
      document.getElementById('load-more-btn').classList.toggle('hidden', !hasNextPlayers);
      document.getElementById('load-more-btn').textContent = 'Load more players...';
    } catch(e) {
      document.getElementById('load-more-btn').textContent = 'Load more players...';
    }
  }

  function statusBadge(status) {
    if (status === 'live') return '<span class="status-badge status-live">🔴 LIVE</span>';
    if (status === 'past') return '<span class="status-badge status-past">✓ PAST</span>';
    return '<span class="status-badge status-upcoming">🕐 UPCOMING</span>';
  }

  function renderMatches(matches) {
    const container = document.getElementById('live-matches');
    matches.forEach(m => {
      const div = document.createElement('div');
      div.className = 'live-match';
      div.onclick = () => window.open(`https://cricheroes.com/scorecard/${m.match_id}`, '_blank');
      const tournament = m.tournament ? `<b>${m.tournament}</b>${m.round ? ' · ' + m.round : ''}` : 'Individual Match';
      div.innerHTML = `
        <div class="match-header">
          <span class="match-type">${tournament} · ${m.overs} Ov · ${m.date}</span>
          ${statusBadge(m.status)}
        </div>
        <div class="match-teams">
          <div class="team-a">
            <div class="team-name">${m.team_a}</div>
            <div class="team-score">${m.team_a_score || '—'}</div>
          </div>
          <div class="vs">vs</div>
          <div class="team-b">
            <div class="team-name">${m.team_b}</div>
            <div class="team-score">${m.team_b_score || '—'}</div>
          </div>
        </div>
        <div class="match-footer">
          📍 ${m.ground}, ${m.city}
          ${m.summary ? `<div class="match-summary">${m.summary}</div>` : ''}
          ${m.winning_team ? `<div style="color:#22c55e;margin-top:0.3rem">🏆 ${m.winning_team} won</div>` : ''}
        </div>`;
      container.appendChild(div);
    });
  }

  async function loadLive() {
    livePage = 1;
    const statusEl = document.getElementById('live-status');
    const errorEl = document.getElementById('live-error');
    const container = document.getElementById('live-matches');
    container.innerHTML = '';
    statusEl.textContent = '🔴 Loading matches...';
    statusEl.classList.remove('hidden');
    errorEl.classList.add('hidden');
    try {
      const res = await fetch('/live-matches?page=1');
      const data = await res.json();
      statusEl.classList.add('hidden');
      hasNextLive = data.has_next;
      if (!data.matches.length) {
        container.innerHTML = '<p style="text-align:center;color:#64748b;margin-top:2rem">No matches found nearby</p>';
        return;
      }
      renderMatches(data.matches);
      document.getElementById('load-more-live').classList.toggle('hidden', !hasNextLive);
    } catch(e) {
      statusEl.classList.add('hidden');
      errorEl.textContent = '⚠️ Could not load matches';
      errorEl.classList.remove('hidden');
    }
  }

  async function loadMoreLive() {
    livePage++;
    document.getElementById('load-more-live').textContent = 'Loading...';
    try {
      const res = await fetch(`/live-matches?page=${livePage}`);
      const data = await res.json();
      hasNextLive = data.has_next;
      renderMatches(data.matches);
      document.getElementById('load-more-live').classList.toggle('hidden', !hasNextLive);
      document.getElementById('load-more-live').textContent = 'Load more matches...';
    } catch(e) {
      document.getElementById('load-more-live').textContent = 'Load more matches...';
    }
  }

  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
